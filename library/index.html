<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Liz's Royal Library ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --purple-deep: #12002e;
            --purple-mid: #3a0d6e;
            --purple-bright: #7b2d8b;
            --pink: #e91e8c;
            --pink-light: #ffb6d9;
            --gold: #ffd700;
            --gold-light: #fff3a0;
            --white: #ffffff;
            --card-bg: rgba(255,255,255,0.07);
            --card-border: rgba(255,215,0,0.25);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--purple-deep);
            min-height: 100vh;
            color: var(--white);
            overflow-x: hidden;
        }

        /* Gradient background layers */
        .bg-layers {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .bg-layers::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 10%, rgba(123,45,139,0.45) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 90%, rgba(233,30,140,0.25) 0%, transparent 60%),
                radial-gradient(ellipse 100% 80% at 50% 50%, rgba(58,13,110,0.8) 0%, transparent 80%);
        }
        .bg-layers::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(18,0,46,0.95) 0%, rgba(58,13,110,0.6) 40%, rgba(123,45,139,0.4) 100%);
        }

        /* Sparkles */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            animation: sparkle-twinkle var(--dur, 3s) infinite var(--delay, 0s) ease-in-out;
        }
        @keyframes sparkle-twinkle {
            0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
            30%, 70% { opacity: 0.8; transform: scale(1) rotate(180deg); }
        }

        /* Header */
        .header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 44px 20px 28px;
        }

        .crown-wrap {
            font-size: 3.2rem;
            display: block;
            animation: float-bounce 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.6));
            margin-bottom: 12px;
        }
        @keyframes float-bounce {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }

        .header h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(1.4rem, 5.5vw, 3rem);
            background: linear-gradient(135deg, #ffd700 0%, #ffb6d9 45%, #ffd700 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer-text 4s linear infinite;
            letter-spacing: 2px;
            line-height: 1.25;
        }
        @keyframes shimmer-text {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .header .subtitle {
            font-family: 'Cinzel', serif;
            color: var(--pink-light);
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            margin-top: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.85;
        }

        .book-count-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.35);
            border-radius: 24px;
            padding: 8px 20px;
            margin-top: 18px;
            font-family: 'Cinzel', serif;
            font-size: 0.82rem;
            color: var(--gold-light);
            letter-spacing: 1px;
        }

        /* Controls */
        .controls {
            position: relative;
            z-index: 10;
            padding: 0 16px 16px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .search-wrap {
            position: relative;
            margin-bottom: 14px;
        }
        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,215,0,0.3);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-family: 'Lato', sans-serif;
            outline: none;
            transition: all 0.3s;
            backdrop-filter: blur(12px);
        }
        .search-input::placeholder { color: rgba(255,255,255,0.4); }
        .search-input:focus {
            border-color: var(--gold);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 24px rgba(255,215,0,0.15), inset 0 0 12px rgba(255,215,0,0.05);
        }

        .filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .filters::-webkit-scrollbar { display: none; }

        .filter-btn {
            flex-shrink: 0;
            padding: 9px 18px;
            border-radius: 22px;
            border: 1.5px solid rgba(255,215,0,0.25);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
            font-size: 0.82rem;
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        .filter-btn:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            border-color: rgba(255,215,0,0.5);
        }
        .filter-btn.active {
            background: linear-gradient(135deg, var(--pink), var(--purple-bright));
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 18px rgba(233,30,140,0.4);
        }

        /* Results count */
        .results-info {
            position: relative;
            z-index: 10;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 16px 14px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }

        /* Grid */
        .grid-container {
            position: relative;
            z-index: 10;
            padding: 0 16px 60px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        @media (min-width: 480px) {
            .books-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 640px) {
            .books-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
        }
        @media (min-width: 900px) {
            .books-grid { grid-template-columns: repeat(4, 1fr); gap: 22px; }
        }
        @media (min-width: 1100px) {
            .books-grid { grid-template-columns: repeat(5, 1fr); }
        }

        /* Book Card */
        .book-card {
            cursor: pointer;
            border-radius: 18px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
        }
        .book-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 24px 48px rgba(0,0,0,0.4), 0 0 24px rgba(255,215,0,0.18), 0 0 48px rgba(233,30,140,0.15);
            border-color: rgba(255,215,0,0.55);
        }
        .book-card:active { transform: translateY(-4px) scale(1.01); }

        .sparkle-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.85rem;
            opacity: 0;
            transform: rotate(-15deg);
            transition: opacity 0.2s, transform 0.2s;
            z-index: 2;
            pointer-events: none;
        }
        .book-card:hover .sparkle-badge { opacity: 1; transform: rotate(10deg) scale(1.2); }

        .book-cover-wrap {
            position: relative;
            padding-top: 148%;
            overflow: hidden;
            background: linear-gradient(145deg, var(--purple-mid), var(--purple-bright));
        }
        .book-cover {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .book-card:hover .book-cover { transform: scale(1.06); }

        .book-cover-fallback {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: linear-gradient(145deg, #3a0d6e, #7b2d8b, rgba(233,30,140,0.3));
            padding: 12px;
        }
        .book-cover-fallback .fallback-icon { font-size: 2.8rem; }
        .book-cover-fallback .fallback-title {
            font-family: 'Cinzel', serif;
            font-size: 0.62rem;
            text-align: center;
            color: rgba(255,255,255,0.75);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-info { padding: 10px 10px 12px; }

        .genre-pill {
            display: inline-block;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 3px 8px;
            border-radius: 10px;
            margin-bottom: 6px;
        }

        .book-title {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            font-weight: 600;
            line-height: 1.35;
            color: white;
            margin-bottom: 3px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .book-author {
            font-size: 0.68rem;
            color: rgba(255,255,255,0.55);
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .book-stars { font-size: 0.65rem; letter-spacing: 1px; }

        /* Genre pill colors */
        .g-romance   { background: rgba(233,30,140,0.22); color: #ff79c6; border: 1px solid rgba(233,30,140,0.4); }
        .g-fantasy   { background: rgba(123,45,139,0.3);  color: #bd93f9; border: 1px solid rgba(123,45,139,0.5); }
        .g-classic   { background: rgba(255,215,0,0.15);  color: #ffd700; border: 1px solid rgba(255,215,0,0.35); }
        .g-mystery   { background: rgba(100,149,237,0.2); color: #8be9fd; border: 1px solid rgba(100,149,237,0.35); }
        .g-historical{ background: rgba(205,133,63,0.2);  color: #ffb86c; border: 1px solid rgba(205,133,63,0.35); }
        .g-adventure { background: rgba(80,200,120,0.2);  color: #50fa7b; border: 1px solid rgba(80,200,120,0.35); }
        .g-dystopia  { background: rgba(255,85,85,0.2);   color: #ff6e6e; border: 1px solid rgba(255,85,85,0.35); }

        /* Empty state */
        .empty-state {
            display: none;
            text-align: center;
            padding: 70px 20px;
        }
        .empty-state .e-icon { font-size: 3.5rem; margin-bottom: 16px; }
        .empty-state p {
            font-family: 'Cinzel', serif;
            color: rgba(255,255,255,0.45);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(8,0,20,0.88);
            backdrop-filter: blur(10px);
            z-index: 200;
            padding: 20px 16px 40px;
            overflow-y: auto;
            justify-content: center;
            align-items: flex-start;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            position: relative;
            background: linear-gradient(160deg, #1e0650 0%, #42126e 50%, #2a0843 100%);
            border: 1px solid rgba(255,215,0,0.35);
            border-radius: 28px;
            max-width: 520px;
            width: 100%;
            margin: auto;
            overflow: hidden;
            box-shadow:
                0 40px 80px rgba(0,0,0,0.6),
                0 0 60px rgba(255,215,0,0.08),
                inset 0 1px 0 rgba(255,255,255,0.08);
            animation: modal-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes modal-pop {
            from { transform: scale(0.75) translateY(50px); opacity: 0; }
            to   { transform: scale(1) translateY(0);       opacity: 1; }
        }

        .modal-top-bar {
            height: 5px;
            background: linear-gradient(90deg, var(--gold), var(--pink), var(--purple-bright), var(--gold));
            background-size: 300% 100%;
            animation: rainbow-bar 3s linear infinite;
        }
        @keyframes rainbow-bar {
            0% { background-position: 0% 0; }
            100% { background-position: 300% 0; }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }
        .modal-close:hover {
            background: rgba(233,30,140,0.3);
            border-color: var(--pink);
            color: white;
            transform: rotate(90deg);
        }

        .modal-header {
            display: flex;
            gap: 20px;
            padding: 24px 24px 20px;
        }

        .modal-cover-frame {
            flex-shrink: 0;
            width: 108px;
            height: 158px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255,215,0,0.12);
            background: linear-gradient(145deg, var(--purple-mid), var(--purple-bright));
        }
        .modal-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-meta {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 7px;
            padding-right: 36px;
        }
        .modal-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            line-height: 1.3;
            background: linear-gradient(135deg, var(--gold), var(--pink-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .modal-author { color: var(--pink-light); font-size: 0.88rem; }
        .modal-details { color: rgba(255,255,255,0.5); font-size: 0.78rem; }
        .modal-stars   { font-size: 0.88rem; letter-spacing: 2px; }
        .modal-rating-label { color: rgba(255,255,255,0.4); font-size: 0.72rem; margin-left: 6px; }

        .modal-body { padding: 0 24px 28px; }
        .modal-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.2), transparent);
            margin-bottom: 18px;
        }
        .modal-desc {
            color: rgba(255,255,255,0.82);
            font-size: 0.91rem;
            line-height: 1.75;
            margin-bottom: 18px;
        }
        .modal-tags { display: flex; flex-wrap: wrap; gap: 7px; }

        /* Footer */
        .footer {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 28px 20px;
            border-top: 1px solid rgba(255,215,0,0.08);
        }
        .footer-text {
            font-family: 'Cinzel', serif;
            font-size: 0.78rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--gold), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .footer-sub { color: rgba(255,255,255,0.25); font-size: 0.7rem; margin-top: 6px; letter-spacing: 1px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
        ::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.25); border-radius: 3px; }
    </style>
</head>
<body>

    <div class="bg-layers"></div>

    <!-- Header -->
    <header class="header">
        <span class="crown-wrap">👑</span>
        <h1>Liz's Royal Library</h1>
        <p class="subtitle">✨ &nbsp; Once Upon a Bookshelf &nbsp; ✨</p>
        <div class="book-count-badge">
            📚 &nbsp; <span id="total-count">0</span> &nbsp; Royal Tomes in the Collection
        </div>
    </header>

    <!-- Search + Filters -->
    <div class="controls">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input
                type="search"
                class="search-input"
                id="search"
                placeholder="Search the enchanted library..."
                autocomplete="off"
            >
        </div>
        <div class="filters" id="filters">
            <button class="filter-btn active" data-genre="all">✨ All Books</button>
            <button class="filter-btn" data-genre="Romance">💕 Romance</button>
            <button class="filter-btn" data-genre="Fantasy">🔮 Fantasy</button>
            <button class="filter-btn" data-genre="Classic">📜 Classic</button>
            <button class="filter-btn" data-genre="Historical">🏰 Historical</button>
            <button class="filter-btn" data-genre="Adventure">⚔️ Adventure</button>
            <button class="filter-btn" data-genre="Dystopia">🌑 Dystopia</button>
            <button class="filter-btn" data-genre="Mystery">🕯️ Mystery</button>
        </div>
    </div>

    <div class="results-info" id="results-info"></div>

    <!-- Book Grid -->
    <main class="grid-container">
        <div class="books-grid" id="books-grid"></div>
        <div class="empty-state" id="empty-state">
            <div class="e-icon">🔮</div>
            <p>No enchanted books found...</p>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal" role="dialog" aria-modal="true">
            <div class="modal-top-bar"></div>
            <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
            <div class="modal-header">
                <div class="modal-cover-frame">
                    <img class="modal-cover" id="modal-cover" src="" alt="">
                </div>
                <div class="modal-meta">
                    <span class="genre-pill" id="modal-genre-pill"></span>
                    <div class="modal-title" id="modal-title"></div>
                    <div class="modal-author" id="modal-author"></div>
                    <div class="modal-details" id="modal-details"></div>
                    <div class="modal-stars" id="modal-stars"></div>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-divider"></div>
                <p class="modal-desc" id="modal-desc"></p>
                <div class="modal-tags" id="modal-tags"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-text">✨ &nbsp; Liz's Royal Library &nbsp; ✨</div>
        <div class="footer-sub">Built with magic &amp; love</div>
    </footer>

    /* ===================== GENRE CONFIG ===================== */
    const GENRE_CLASS = {
        Romance: 'g-romance',
        Fantasy: 'g-fantasy',
        Classic: 'g-classic',
        Mystery: 'g-mystery',
        Historical: 'g-historical',
        Adventure: 'g-adventure',
        Dystopia: 'g-dystopia',
    };

    /* ===================== STATE ===================== */
    let activeGenre = 'all';
    let searchQuery = '';

    /* ===================== HELPERS ===================== */
    function coverUrl(isbn) {
        return `https://covers.openlibrary.org/b/isbn/${isbn}-L.jpg`;
    }

    function renderStars(n) {
        return '⭐'.repeat(n) + '☆'.repeat(Math.max(0, 5 - n));
    }

    function getFiltered() {
        const q = searchQuery.trim().toLowerCase();
        return BOOKS.filter(b => {
            if (activeGenre !== 'all' && b.genre !== activeGenre) return false;
            if (!q) return true;
            return (
                b.title.toLowerCase().includes(q) ||
                b.author.toLowerCase().includes(q) ||
                b.genre.toLowerCase().includes(q) ||
                b.tags.some(t => t.toLowerCase().includes(q))
            );
        });
    }

    /* ===================== RENDER ===================== */
    function renderBooks() {
        const grid    = document.getElementById('books-grid');
        const empty   = document.getElementById('empty-state');
        const info    = document.getElementById('results-info');
        const filtered = getFiltered();

        grid.innerHTML = '';

        if (filtered.length === 0) {
            empty.style.display = 'block';
            info.textContent = '';
            return;
        }

        empty.style.display = 'none';
        info.textContent =
            filtered.length === BOOKS.length
                ? `Showing all ${BOOKS.length} books`
                : `Showing ${filtered.length} of ${BOOKS.length} books`;

        filtered.forEach(book => {
            const card = document.createElement('div');
            card.className = 'book-card';
            card.setAttribute('role', 'button');
            card.setAttribute('tabindex', '0');
            card.setAttribute('aria-label', `${book.title} by ${book.author}`);

            card.innerHTML = `
                <span class="sparkle-badge">✨</span>
                <div class="book-cover-wrap">
                    <img
                        class="book-cover"
                        src="${coverUrl(book.isbn)}"
                        alt="${book.title} cover"
                        loading="lazy"
                        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
                    >
                    <div class="book-cover-fallback">
                        <span class="fallback-icon">📚</span>
                        <span class="fallback-title">${book.title}</span>
                    </div>
                </div>
                <div class="book-info">
                    <span class="genre-pill ${GENRE_CLASS[book.genre] || ''}">${book.genre}</span>
                    <div class="book-title">${book.title}</div>
                    <div class="book-author">${book.author}</div>
                    <div class="book-stars">${renderStars(book.rating)}</div>
                </div>
            `;

            card.addEventListener('click', () => openModal(book));
            card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(book); });
            grid.appendChild(card);
        });
    }

    /* ===================== MODAL ===================== */
    function openModal(book) {
        const cover = document.getElementById('modal-cover');
        cover.src = coverUrl(book.isbn);
        cover.alt = `${book.title} cover`;
        cover.onerror = () => { cover.src = ''; };

        const pill = document.getElementById('modal-genre-pill');
        pill.textContent = book.genre;
        pill.className = `genre-pill ${GENRE_CLASS[book.genre] || ''}`;

        document.getElementById('modal-title').textContent   = book.title;
        document.getElementById('modal-author').textContent  = `by ${book.author}`;
        document.getElementById('modal-details').textContent = `${book.year} · ${book.pages} pages`;
        document.getElementById('modal-stars').innerHTML     =
            `${renderStars(book.rating)} <span class="modal-rating-label">Liz's rating</span>`;
        document.getElementById('modal-desc').textContent    = book.description;

        const tagsEl = document.getElementById('modal-tags');
        tagsEl.innerHTML = book.tags
            .map(t => `<span class="genre-pill g-fantasy">${t}</span>`)
            .join('');

        document.getElementById('modal-overlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('open');
        document.body.style.overflow = '';
    }

    /* ===================== SPARKLES ===================== */
    function createSparkles() {
        const chars  = ['✦', '✧', '✨', '💫', '⭐', '🌟', '✵'];
        const colors = ['#ffd700', '#ff79c6', '#bd93f9', '#ffb6d9'];
        for (let i = 0; i < 24; i++) {
            const el = document.createElement('div');
            el.className = 'sparkle';
            el.textContent = chars[i % chars.length];
            el.style.cssText = [
                `left:${Math.random() * 100}vw`,
                `top:${Math.random() * 100}vh`,
                `font-size:${Math.random() * 12 + 7}px`,
                `color:${colors[Math.floor(Math.random() * colors.length)]}`,
                `--dur:${(Math.random() * 4 + 2).toFixed(1)}s`,
                `--delay:${(Math.random() * 5).toFixed(1)}s`,
            ].join(';');
            document.body.appendChild(el);
        }
    }

    /* ===================== EVENTS ===================== */
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', e => {
        if (e.target === document.getElementById('modal-overlay')) closeModal();
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
    });

    document.getElementById('search').addEventListener('input', e => {
        searchQuery = e.target.value;
        renderBooks();
    });

    document.getElementById('filters').addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeGenre = btn.dataset.genre;
        renderBooks();
    });

    /* ===================== INIT ===================== */
    document.getElementById('total-count').textContent = BOOKS.length;
    createSparkles();
    renderBooks();
    </script>
