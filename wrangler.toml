name = "deckspace"
compatibility_date = "2024-09-23"
pages_build_output_dir = "public"

# All env vars (including APP_NAME) are managed via the Cloudflare Pages
# dashboard / API instead of wrangler.toml. Defining [vars] here causes
# `wrangler pages deploy` to overwrite the project's env vars on each deploy.
#
# Set via: wrangler secret put <KEY>
# or in Cloudflare Pages dashboard → Settings → Environment Variables
#
# Required secrets:
#   SUPABASE_URL          — your project URL
#   SUPABASE_ANON_KEY     — anon/public key
#   SUPABASE_SERVICE_KEY  — service role key (admin ops)
#   JWT_SECRET            — random 32+ char string for session tokens
#   TURNSTILE_SECRET_KEY  — Cloudflare Turnstile secret
#   TURNSTILE_SITE_KEY    — Cloudflare Turnstile site key
#   SAILING_ID            — UUID of the active sailing record
#   R2_PUBLIC_URL         — public R2 bucket URL (no trailing slash)

# R2 media storage binding
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "deckspace-media"
